<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f0f0f0;
display:flex;
justify-content:center;
}

.container{
max-width:700px;
width:100%;
background:white;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

.art-image{
display:block;
margin:auto;
max-width:100%;
height:auto;
border-radius:6px;

/* prevent download tricks */
user-select:none;
-webkit-user-drag:none;
-webkit-touch-callout:none;
pointer-events:none;
}

.description{
margin-top:20px;
font-size:18px;
line-height:1.6;
text-align:center;
}

.credit-bar{
position:fixed;
bottom:0;
width:100%;
background:#222;   /* dark modern color */
color:#fff;
overflow:hidden;
white-space:nowrap;
font-size:14px;
}

.credit-bar span{
display:inline-block;
padding:6px 0;   /* makes it narrow */
animation:scrollRight 18s linear infinite;
}

/* LEFT → RIGHT movement */
@keyframes scrollRight{
0%{
transform:translateX(-100%);
}
100%{
transform:translateX(100%);
}
}

</style>

</head>

<body>

<div class="container">

<h1 id="name" class="title"></h1>

<img id="image" class="art-image">

<p id="desc" class="description"></p>

</div>

<script>

/* Disable Right Click */
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});

/* Disable Dragging */
document.addEventListener("dragstart", function(e){
e.preventDefault();
});

/* Disable F12 Dev Tools (basic protection) */
document.addEventListener("keydown", function(e){
if(e.keyCode == 123){
e.preventDefault();
}
});

/* Artifact loading system */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.body.innerHTML = `
<div style="text-align:center;padding:40px;">
<h2>Scan QR on the artwork</h2>
</div>

<div class="credit-bar">
<span>&nbsp;&nbsp; Developed by Saurav Panda aka @dearlipu | Odi Art Centre Digital System Management &nbsp;&nbsp;</span>
</div>
`;
return;
}

fetch("data.json")
.then(res => res.json())
.then(data => {

const item = data.find(row => row.id == id);

if(!item){
document.body.innerHTML = "<h2 style='text-align:center'>Artifact not found</h2>";
return;
}

document.getElementById("name").innerText = item.name;
document.getElementById("image").src = item.image;
document.getElementById("desc").innerText = item.description;

});

</script>

</body>
</html>
