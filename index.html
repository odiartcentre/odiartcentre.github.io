<!DOCTYPE html>
<html>
  
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body{
    margin:0;
    font-family: system-ui, -apple-system, Arial, sans-serif;
    background:#fff;
    color:#111;
  }

    .header{
      font-size:18px;
      font-weight:600;
      padding:14px 16px;
      border-bottom:1px solid #eee;
      text-align:center;
    }
    
    .container{
      max-width:600px;
      margin:auto;
      padding:16px;
      box-sizing:border-box;
    }
    
    .art-image{
      width:100%;
      max-height:320px;
      object-fit:contain; 
      background:#f5f5f5; 
      padding:8px;  
      border-radius:6px;  
      margin:0 auto 16px auto;
      box-sizing:border-box; 
    }
    
    .title{
      font-size:22px;
      font-weight:600;
      margin-bottom:8px;
    }
    
    .meta{
      font-size:14px;
      color:#666;
      margin-bottom:12px;
    }
    
    .divider{
      height:1px;
      background:#eee;
      margin:12px 0;
    }
    
    .description{
      font-size:15px;
      line-height:1.6;
      margin-bottom:16px;
    }
    
    .artist-box{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top:16px;
      gap:10px;
      border-top:1px solid #eee;
      padding-top:12px;
    }
    
    .artist-name{
      font-size:18px;
      font-weight:600;
    }
      
    .artist-img{
      width:60px;
      height:60px;
      object-fit:cover;
      border-radius:6px;
    }
  
</style>

</head>
  
<body>

<div class="header">Odi Art Centre</div>

<div class="container">

  <img id="image" class="art-image" loading="lazy">

  <div id="name" class="title"></div>

  <div id="meta" class="meta"></div>

  <div id="divider" class="divider"></div>

  <div id="desc" class="description"></div>
  
  <div id="artistBox" class="artist-box">
    <div id="artistName" class="artist-name"></div>
    <img id="artistImg" class="artist-img" loading="lazy">
  </div>

</div>

<script>

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
document.addEventListener("keydown", function(e){
if(e.keyCode == 123){ e.preventDefault(); }
});

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.body.innerHTML = "<h2 style='text-align:center'>Scan QR on artwork</h2><div style='position:fixed;bottom:10px;width:100%;text-align:center;font-size:12px;color:gray;'>Developed by @dearlipu aka Saurav Panda</div>";
throw new Error("No ID");
}

fetch("data.json")
.then(res => res.json())
.then(data => {

const item = data.find(row => row.id == id);

if(!item){
document.body.innerHTML = "<h2 style='text-align:center'>Artifact not found</h2><div style='position:fixed;bottom:10px;width:100%;text-align:center;font-size:12px;color:gray;'>Developed by @dearlipu aka Saurav Panda</div>";
return;
}

const setText = (id, value) => {
  const el = document.getElementById(id);
  if(value && value.trim() !== ""){
    el.innerHTML = value.replace(/\n/g, "<br>");
  } else {
    el.style.display = "none";
  }
};

const setImage = (id, src) => {
  const el = document.getElementById(id);
  if(src){
    el.src = src;
  } else {
    el.style.display = "none";
  }
};

setText("name", item.name);
setText("desc", item.description);

setImage("image", item.art_image);
setImage("artistImg", item.artist_image);

setText("artistName", item.artist_name);

let metaText = "";

if(item.medium) metaText += item.medium;
if(item.century) metaText += (metaText ? " • " : "") + item.century;
if(item.location) metaText += (metaText ? " • " : "") + item.location;

if(metaText){
  document.getElementById("meta").innerText = metaText;
} else {
  document.getElementById("meta").style.display = "none";
}

if(!item.description){
  document.getElementById("divider").style.display = "none";
}

if(!item.artist_name && !item.artist_image){
  document.getElementById("artistBox").style.display = "none";
}

})
.catch(() => {
document.body.innerHTML = "<h2 style='text-align:center'>Error loading data</h2>";
});

</script>

</body>
</html>
