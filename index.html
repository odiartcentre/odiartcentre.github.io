<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#eaeaea;
display:flex;
justify-content:center;
}

/* Card layout */
.container{
max-width:650px;
width:100%;
background:white;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* Image */
.art-image{
display:block;
margin:auto;
max-width:100%;
height:auto;
border-radius:10px;
}

/* Label */
.label{
text-align:center;
font-size:12px;
color:#888;
letter-spacing:1px;
margin-top:10px;
}

/* Title */
.title{
text-align:center;
font-size:26px;
font-weight:600;
margin-top:15px;
}

/* Medium */
.medium{
text-align:center;
font-size:18px;
color:#666;
margin-top:5px;
}

/* Divider */
.divider{
width:40px;
height:3px;
background:#ddd;
margin:15px auto;
border-radius:5px;
}

/* Description */
.description{
font-size:16px;
line-height:1.6;
text-align:center;
color:#333;
padding:0 10px;
}

</style>

</head>

<body>

<div class="container">
  
<img id="image" class="art-image">

<div class="label">ARTIFACT</div>

<h1 id="name" class="title"></h1>

<h2 id="medium" class="medium"></h2>

<div class="divider"></div>

<p id="desc" class="description"></p>

</div>

<script>

/* Disable Right Click */
document.addEventListener("contextmenu", e => e.preventDefault());

/* Disable Dragging */
document.addEventListener("dragstart", e => e.preventDefault());

/* Disable F12 */
document.addEventListener("keydown", function(e){
if(e.keyCode == 123){ e.preventDefault(); }
});

/* Get ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* No ID → homepage */
if(!id){
document.querySelector(".container").innerHTML = `
<h2 style="text-align:center">Scan QR on the artwork</h2>
`;
return;
}

/* Fetch data */
fetch("data.json")
.then(res => {
if(!res.ok) throw new Error("JSON not found");
return res.json();
})
.then(data => {

const item = data.find(row => row.id == id);

if(!item){
document.body.innerHTML = "<h2 style='text-align:center'>Artifact not found</h2>";
return;
}

/* Fill UI */
document.getElementById("name").innerText = item.name;
document.getElementById("image").src = item.image;
document.getElementById("desc").innerText = item.description;
document.getElementById("medium").innerText = item.medium;

})
.catch(() => {
document.body.innerHTML = "<h2>Error loading data. Please scan again.</h2>";
});

</script>

</body>
</html>
